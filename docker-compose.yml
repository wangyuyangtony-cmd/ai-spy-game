version: "3.8"

services:
  ai-spy-game:
    build: .
    container_name: ai-spy-game
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - MOCK_MODE=${MOCK_MODE:-true}
      - DB_PATH=./data/spy-game.db
      # Uncomment below to use real LLM API
      # - LLM_API_BASE=${LLM_API_BASE:-https://api.openai.com/v1}
      # - LLM_API_KEY=${LLM_API_KEY}
      # - LLM_DEFAULT_MODEL=${LLM_DEFAULT_MODEL:-gpt-3.5-turbo}
    volumes:
      # Persist SQLite database across container restarts
      - game-data:/app/backend/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  game-data:
    driver: local
